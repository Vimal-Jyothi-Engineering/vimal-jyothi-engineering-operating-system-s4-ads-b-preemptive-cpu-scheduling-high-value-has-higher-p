name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Test 1
      id: test-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 1
        setup-command: ''
        command: make test
        input: |-
          5
          P1 0 5 2
          P2 1 3 4
          P3 2 4 1
          P4 3 2 3
          P5 4 6 5
        expected-output: |-
          Waiting Time:
          P1 11
          P2 0
          P3 14
          P4 7
          P5 0
          Turnaround Time:
          P1 16
          P2 3
          P3 18
          P4 9
          P5 6
          Average Waiting Time: 6.40
          Average Turnaround Time: 10.40
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 1
      id: test-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 1
        setup-command: ''
        command: make test
        input: |-
          5
          P1 0 5 2
          P2 1 3 4
          P3 2 4 1
          P4 3 2 3
          P5 4 6 5
        expected-output: |-
          Waiting Time:
          P1 11
          P2 0
          P3 14
          P4 7
          P5 0
          Turnaround Time:
          P1 16
          P2 3
          P3 18
          P4 9
          P5 6
          Average Waiting Time: 6.40
          Average Turnaround Time: 10.40
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST-1_RESULTS: "${{steps.test-1.outputs.result}}"
      with:
        runners: test-1,test-1
